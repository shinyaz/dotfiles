# =============================================================================
# General
# =============================================================================

# プロンプト先頭に改行を入れて見やすくする
add_newline = true

# コマンド実行後の右端に表示するまでの待機時間
command_timeout = 1000

# プロンプトの構成
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$aws\
$cmd_duration\
$line_break\
$character"""

# =============================================================================
# Prompt Character
# =============================================================================

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# =============================================================================
# Directory
# =============================================================================

[directory]
truncation_length = 3
truncation_symbol = "…/"
read_only = " 🔒"
style = "bold cyan"

# =============================================================================
# Git
# =============================================================================

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

# =============================================================================
# Languages (プロジェクトディレクトリにいるときだけ表示)
# =============================================================================

[python]
format = '[${symbol}${version}( \($virtualenv\))]($style) '
symbol = " "
style = "yellow"

[nodejs]
format = "[$symbol$version]($style) "
symbol = " "
style = "green"

[rust]
format = "[$symbol$version]($style) "
symbol = " "
style = "red"

[golang]
format = "[$symbol$version]($style) "
symbol = " "
style = "cyan"

[java]
format = "[$symbol$version]($style) "
symbol = " "
style = "red"

# =============================================================================
# Cloud
# =============================================================================

[aws]
format = '[$symbol($profile)(\($region\))]($style) '
symbol = "☁️ "
style = "bold orange"

# =============================================================================
# Command Duration
# =============================================================================

[cmd_duration]
min_time = 3000
format = "[$duration]($style) "
style = "bold yellow"
show_milliseconds = false

# =============================================================================
# 不要なモジュールを無効化 (プロンプト高速化)
# =============================================================================

[package]
disabled = true

[docker_context]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true
