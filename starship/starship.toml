# =============================================================================
# General
# =============================================================================

# Add newline at prompt start for readability
add_newline = true

# Wait time before displaying at right edge after command execution
command_timeout = 1000

# Prompt format
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$cmd_duration\
$line_break\
$character"""

# =============================================================================
# Prompt Character
# =============================================================================

[character]
success_symbol = "[ÔŁ»](bold green)"
error_symbol = "[ÔŁ»](bold red)"

# =============================================================================
# Directory
# =============================================================================

[directory]
truncation_length = 3
truncation_symbol = "ÔÇŽ/"
read_only = " ­čöĺ"
style = "bold cyan"

# =============================================================================
# Git
# =============================================================================

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"
conflicted = "="
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "Ôçí${ahead_count}Ôçú${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "Ôťś${count}"

# =============================================================================
# Languages (displayed only in project directories)
# =============================================================================

[python]
format = '[${symbol}${version}( \($virtualenv\))]($style) '
symbol = " "
style = "yellow"

[nodejs]
format = "[$symbol$version]($style) "
symbol = " "
style = "green"

[rust]
format = "[$symbol$version]($style) "
symbol = " "
style = "red"

[golang]
format = "[$symbol$version]($style) "
symbol = " "
style = "cyan"

[java]
format = "[$symbol$version]($style) "
symbol = " "
style = "red"

# =============================================================================
# Command Duration
# =============================================================================

[cmd_duration]
min_time = 3000
format = "[$duration]($style) "
style = "bold yellow"
show_milliseconds = false

# =============================================================================
# Disable unnecessary modules (speed up prompt)
# =============================================================================

[package]
disabled = true

[docker_context]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true
