# =============================================================================
# tmux Configuration
# =============================================================================

# --- General ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # True color support
set -g escape-time 0                              # No delay for escape key
set -g history-limit 50000                        # Scrollback buffer size
set -g mouse on                                   # Enable mouse support
set -g focus-events on                            # Pass focus events to apps
set -g set-clipboard on                           # Use system clipboard

# --- Prefix Key ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- Window & Pane Indexing ---
set -g base-index 1                               # Start windows at 1
setw -g pane-base-index 1                         # Start panes at 1
set -g renumber-windows on                        # Renumber on close

# --- Key Bindings ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Vim-style Pane Navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane Resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy Mode (vi) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- Status Bar ---
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=cyan,bold] #S "
set -g status-right "#[fg=white]%Y-%m-%d %H:%M "
set -g status-left-length 30
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=cyan,bold] #I:#W "

# --- Pane Borders ---
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=cyan"
