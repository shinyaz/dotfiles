# =============================================================================
# tmux Configuration
# =============================================================================

# --- General ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # True color support
set -ga terminal-overrides ",*:U8=0"              # Correct Unicode/CJK width calculation
set -g escape-time 50                             # Delay for IME escape sequences (stable with CJK input)
set -g history-limit 50000                        # Scrollback buffer size
set -g mouse on                                   # Enable mouse support
set -g focus-events on                            # Pass focus events to apps
set -g set-clipboard on                           # Use system clipboard
set -gq allow-passthrough on                      # Allow passthrough sequences (IME etc.)

# --- UTF-8 ---
setw -gq utf8 on

# --- Prefix Key ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- Window & Pane Indexing ---
set -g base-index 1                               # Start windows at 1
setw -g pane-base-index 1                         # Start panes at 1
set -g renumber-windows on                        # Renumber on close

# --- Key Bindings ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Pane Navigation (Arrow Keys) ---
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# --- Pane Resizing (Shift + Arrow Keys) ---
bind -r S-Left  resize-pane -L 5
bind -r S-Down  resize-pane -D 5
bind -r S-Up    resize-pane -U 5
bind -r S-Right resize-pane -R 5

# --- Copy Mode (emacs) ---
setw -g mode-keys emacs

# --- Status Bar ---
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=cyan,bold] #S "
set -g status-right "#[fg=white]%Y-%m-%d %H:%M "
set -g status-left-length 30
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=cyan,bold] #I:#W "

# --- Pane Borders ---
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=cyan"
